<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Cofre · Metas</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0c0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Metas">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#0d0c0a; --bg1:#161410; --bg2:#1e1b16; --bg3:#252118;
  --bdr:rgba(255,255,255,.08); --bdr2:rgba(255,255,255,.04);
  --txt:#f0e8d8; --dim:#8a7d69; --faint:#4a4035;
  --gold:#d4a843; --gold-dim:rgba(212,168,67,.14); --gold-ink:#0d0c0a;
  --green:#6aad58; --green-dim:rgba(106,173,88,.14);
  --red:#d4655a; --red-dim:rgba(212,101,90,.14);
  --r-xl:26px; --r-lg:20px; --r-md:14px; --r-sm:10px;
  --sb:env(safe-area-inset-bottom,0px); --st:env(safe-area-inset-top,0px);
}
html[data-theme=light]{
  --bg:#f4efe6; --bg1:#fff; --bg2:#fff; --bg3:#ede7db;
  --bdr:rgba(0,0,0,.09); --bdr2:rgba(0,0,0,.04);
  --txt:#1a1510; --dim:#786c58; --faint:#b0a48e;
  --gold:#b8892a; --gold-dim:rgba(184,137,42,.12); --gold-ink:#fff;
  --green:#3d8630; --green-dim:rgba(61,134,48,.12);
  --red:#bc4039; --red-dim:rgba(188,64,57,.12);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;overscroll-behavior:none;}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s;}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit;}
input,select,textarea{font-family:inherit;color:var(--txt);}
::-webkit-scrollbar{display:none;}
.serif{font-family:'Fraunces',serif;}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999;}
#splash .logo{width:80px;height:80px;border-radius:22px;overflow:hidden;box-shadow:0 8px 32px rgba(212,168,67,.25);}
#splash .logo img{width:100%;height:100%;object-fit:cover;}
#splash .name{font-family:'Fraunces',serif;font-size:28px;font-weight:700;}
#splash .sub{color:var(--dim);font-size:12px;letter-spacing:1.2px;text-transform:uppercase;}
#splash .spin{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:blink 1.2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:.25;transform:scale(.65)}50%{opacity:1;transform:scale(1)}}
.splash-err{color:var(--red);font-size:13px;text-align:center;line-height:1.6;max-width:280px;padding:0 20px;display:none;}

/* APP SHELL */
#app{display:none;max-width:540px;margin:0 auto;min-height:100vh;padding-bottom:calc(100px + var(--sb));}

/* TOPBAR */
.topbar{padding:calc(14px + var(--st)) 20px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;background:var(--bg);}
.topbar .left{display:flex;align-items:center;gap:10px;}
.topbar .left img{width:28px;height:28px;border-radius:8px;object-fit:cover;}
.topbar .brand{font-family:'Fraunces',serif;font-size:19px;font-weight:700;display:flex;align-items:baseline;gap:5px;}
.topbar .brand small{font-family:'Inter',sans-serif;font-size:11px;color:var(--dim);font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--bg2);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;color:var(--dim);}
.icon-btn:active{transform:scale(.88);}

/* MAIN */
main{padding:0 16px 16px;}

/* SUMMARY STRIP */
.summary{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding:2px 0;}
.sum-chip{flex:0 0 auto;background:var(--bg2);border:1px solid var(--bdr);border-radius:30px;padding:8px 14px;font-size:12.5px;color:var(--dim);white-space:nowrap;}
.sum-chip strong{color:var(--txt);font-weight:700;}
.sum-chip.alert{background:var(--red-dim);border-color:rgba(212,101,90,.25);color:var(--red);}
.sum-chip.done{background:var(--green-dim);border-color:rgba(106,173,88,.25);color:var(--green);}

/* GOAL CARD */
.goal-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r-xl);padding:20px;margin-bottom:14px;position:relative;overflow:hidden;cursor:pointer;}
.goal-card:active{transform:scale(.985);}
.goal-card .accent-bar{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px;}
.goal-card .top-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;}
.goal-card .emoji-wrap{width:50px;height:50px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.goal-card .meta-info{flex:1;min-width:0;}
.goal-card .meta-name{font-family:'Fraunces',serif;font-size:18px;font-weight:700;line-height:1.2;margin-bottom:4px;}
.goal-card .meta-desc{font-size:12.5px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.goal-card .deadline-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.goal-card .deadline-badge.ok{background:var(--bg3);color:var(--dim);}
.goal-card .deadline-badge.warn{background:var(--gold-dim);color:var(--gold);}
.goal-card .deadline-badge.late{background:var(--red-dim);color:var(--red);}
.goal-card .deadline-badge.done{background:var(--green-dim);color:var(--green);}

/* PROGRESS */
.progress-section{margin-bottom:14px;}
.progress-nums{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.progress-nums .cur{font-family:'Fraunces',serif;font-size:22px;font-weight:800;line-height:1;}
.progress-nums .tgt{font-size:13px;color:var(--dim);}
.progress-nums .pct{font-size:13px;font-weight:700;color:var(--dim);}
.track{height:8px;background:var(--bg3);border-radius:8px;overflow:hidden;}
.fill{height:100%;border-radius:8px;transition:width .6s cubic-bezier(.2,.8,.2,1);}

/* ACTION BUTTONS */
.card-actions{display:flex;gap:8px;margin-top:14px;}
.act-btn{flex:1;padding:10px;border-radius:var(--r-md);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;}
.act-btn.add{background:var(--gold-dim);color:var(--gold);}
.act-btn.set{background:var(--bg3);color:var(--dim);}
.act-btn:active{opacity:.7;}

/* COMPLETED overlay */
.completed-banner{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--green-dim);border-radius:var(--r-sm);padding:10px;font-size:14px;font-weight:700;color:var(--green);margin-top:10px;}

/* EMPTY STATE */
.empty{text-align:center;padding:56px 24px;color:var(--dim);}
.empty .big{font-size:52px;display:block;margin-bottom:16px;}
.empty .etitle{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--txt);margin-bottom:8px;}
.empty p{font-size:14px;line-height:1.6;max-width:260px;margin:0 auto 24px;}
.empty .start-btn{background:var(--gold);color:var(--gold-ink);padding:14px 28px;border-radius:var(--r-md);font-size:15px;font-weight:700;}

/* FAB */
.fab{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(28px + var(--sb));z-index:50;background:var(--gold);color:var(--gold-ink);border:none;border-radius:30px;padding:15px 28px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;box-shadow:0 8px 28px rgba(212,168,67,.38);}
.fab:active{transform:translateX(-50%) scale(.93);}
.fab svg{width:18px;height:18px;}

/* OVERLAYS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:none;align-items:flex-end;backdrop-filter:blur(4px);}
.overlay.show{display:flex;}
.sheet{background:var(--bg1);width:100%;max-width:540px;margin:0 auto;border-radius:28px 28px 0 0;max-height:92vh;overflow-y:auto;padding:8px 20px calc(28px + var(--sb));animation:shup .28s cubic-bezier(.18,.89,.32,1);}
@keyframes shup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.handle{width:36px;height:4px;background:var(--bdr);border-radius:4px;margin:0 auto 18px;}
.sh-title{font-family:'Fraunces',serif;font-size:21px;font-weight:700;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
.sh-title .x{width:30px;height:30px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:16px;}

/* FORM FIELDS */
.f{margin-bottom:16px;}
.f label{display:block;font-size:12px;font-weight:700;color:var(--dim);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px;}
.f input,.f select,.f textarea{width:100%;padding:13px 15px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r-md);font-size:15px;}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:var(--gold);}
.f textarea{resize:none;min-height:58px;}
.f select option{background:var(--bg1);}

/* BIG AMOUNT INPUT */
.big-amount{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 0 8px;}
.big-amount .prefix{font-family:'Fraunces',serif;font-size:26px;color:var(--dim);font-weight:600;}
.big-amount input{background:none;border:none;font-family:'Fraunces',serif;font-size:44px;font-weight:800;text-align:center;width:220px;color:var(--txt);}
.big-amount input:focus{outline:none;}

/* SEGMENTED */
.seg{display:flex;background:var(--bg2);border-radius:var(--r-md);padding:4px;gap:4px;margin-bottom:18px;}
.seg button{flex:1;padding:10px;border-radius:var(--r-sm);font-size:13px;font-weight:700;color:var(--dim);}
.seg button.on{background:var(--bg);color:var(--txt);}
html[data-theme=light] .seg button.on{background:var(--bg1);}

/* UPDATE MODE TOGGLE */
.mode-tabs{display:flex;gap:10px;margin-bottom:20px;}
.mode-tab{flex:1;padding:12px;border-radius:var(--r-md);background:var(--bg2);border:1.5px solid var(--bdr);font-size:13px;font-weight:700;color:var(--dim);}
.mode-tab.on{border-color:var(--gold);background:var(--gold-dim);color:var(--gold);}

/* EMOJI GRID */
.emoji-grid{display:flex;flex-wrap:wrap;gap:8px;max-height:150px;overflow-y:auto;}
.e-btn{width:44px;height:44px;border-radius:12px;background:var(--bg2);border:1.5px solid transparent;font-size:20px;display:flex;align-items:center;justify-content:center;}
.e-btn.on{border-color:var(--gold);background:var(--gold-dim);}

/* COLOR DOTS */
.color-row{display:flex;gap:10px;flex-wrap:wrap;}
.c-dot{width:32px;height:32px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;}
.c-dot.on{border-color:var(--txt);}

/* BUTTONS */
.btn-p{width:100%;padding:15px;border-radius:var(--r-md);background:var(--gold);color:var(--gold-ink);font-size:15px;font-weight:700;margin-top:6px;}
.btn-p:active{opacity:.84;}
.btn-del{width:100%;padding:13px;text-align:center;color:var(--red);font-size:13.5px;font-weight:600;margin-top:6px;}
.btn-s{width:100%;padding:13px;border-radius:var(--r-md);background:var(--bg2);border:1px solid var(--bdr);color:var(--dim);font-size:14px;font-weight:600;margin-top:10px;}

/* SETTINGS */
.set-row{display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid var(--bdr2);}
.set-row:last-child{border-bottom:none;}
.set-row .ic{width:34px;height:34px;border-radius:10px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.set-row .tl{flex:1;font-size:14px;font-weight:600;}
.set-row .ch{color:var(--dim);}

/* DETAIL SHEET */
.detail-hero{text-align:center;padding:20px 0 24px;}
.detail-hero .big-emoji{font-size:54px;margin-bottom:10px;display:block;}
.detail-hero .d-name{font-family:'Fraunces',serif;font-size:24px;font-weight:800;margin-bottom:6px;}
.detail-hero .d-desc{font-size:14px;color:var(--dim);line-height:1.5;}
.detail-stats{display:flex;gap:10px;margin:16px 0;}
.d-stat{flex:1;background:var(--bg2);border-radius:var(--r-md);padding:12px 10px;text-align:center;}
.d-stat .dv{font-family:'Fraunces',serif;font-size:18px;font-weight:800;margin-bottom:2px;}
.d-stat .dl{font-size:11px;color:var(--dim);font-weight:600;}
.detail-progress{margin-bottom:20px;}
.detail-progress .dp-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;color:var(--dim);}
.detail-progress .dp-row strong{color:var(--txt);}

/* CONFIRM */
.cfm{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);padding:28px;}
.cfm.show{display:flex;}
.cfm .panel{background:var(--bg1);border-radius:22px;padding:24px;max-width:300px;width:100%;text-align:center;}
.cfm h3{font-family:'Fraunces',serif;font-size:19px;font-weight:700;margin-bottom:8px;}
.cfm p{font-size:13.5px;color:var(--dim);line-height:1.5;margin-bottom:20px;}
.cfm .acts{display:flex;gap:8px;}
.cfm .acts button{flex:1;padding:13px;border-radius:12px;font-weight:700;font-size:14px;}
.cfm .cancel{background:var(--bg2);color:var(--dim);}
.cfm .ok{background:var(--red);color:#fff;}

/* TOAST */
.toast{position:fixed;bottom:calc(108px + var(--sb));left:50%;transform:translateX(-50%) translateY(8px);background:var(--bg2);border:1px solid var(--bdr);color:var(--txt);padding:11px 18px;border-radius:30px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="splash">
  <div class="logo"><img src="apple-touch-icon.png" onerror="this.style.display='none'"></div>
  <div class="name">Cofre</div>
  <div class="sub">Suas metas</div>
  <div class="spin"></div>
  <div class="splash-err" id="splashErr"></div>
</div>

<div id="app">
  <header class="topbar">
    <div class="left">
      <img src="apple-touch-icon.png" onerror="this.style.display='none'">
      <div class="brand">Metas <small>Cofre</small></div>
    </div>
    <button class="icon-btn" onclick="openSettings()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </header>

  <main>
    <div class="summary" id="summary"></div>
    <div id="goalsList"></div>
  </main>

  <button class="fab" onclick="openNewMeta()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    Nova meta
  </button>
</div>

<!-- ══ NOVA / EDITAR META ══ -->
<div class="overlay" id="ovMeta">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sh-title"><span id="metaModalTitle">Nova meta</span><span class="x" onclick="closeSheet('ovMeta')">✕</span></div>

    <div class="f"><label>Nome da meta</label><input type="text" id="mNome" placeholder="Ex: Parto do bebê, Academia 100x..."></div>

    <div class="f">
      <label>Tipo</label>
      <div class="seg">
        <button id="segDinheiro" class="on" onclick="setMetaTipo('dinheiro')">💰 Financeira (R$)</button>
        <button id="segContador" onclick="setMetaTipo('contador')">🔢 Contador</button>
      </div>
    </div>

    <div class="f" id="fUnidade" style="display:none">
      <label>Unidade (o que você vai contar)</label>
      <input type="text" id="mUnidade" placeholder="Ex: treinos, páginas, livros, km...">
    </div>

    <div class="f">
      <label id="mAlvoLabel">Meta total (R$)</label>
      <input type="text" inputmode="decimal" id="mAlvo" placeholder="0,00">
    </div>

    <div class="f">
      <label id="mAtualLabel">Já tenho / já fiz</label>
      <input type="text" inputmode="decimal" id="mAtual" placeholder="0">
    </div>

    <div class="f"><label>Prazo (data limite)</label><input type="date" id="mPrazo"></div>

    <div class="f"><label>Ícone</label>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>

    <div class="f"><label>Cor</label>
      <div class="color-row" id="colorRow"></div>
    </div>

    <div class="f"><label>Descrição (opcional)</label>
      <textarea id="mDesc" placeholder="Contexto, motivação..."></textarea>
    </div>

    <button class="btn-p" onclick="saveMeta()">Salvar meta</button>
    <button class="btn-del" id="metaDelBtn" style="display:none" onclick="askDel()">Excluir esta meta</button>
  </div>
</div>

<!-- ══ ATUALIZAR PROGRESSO ══ -->
<div class="overlay" id="ovUpdate">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sh-title"><span id="updTitle">Atualizar progresso</span><span class="x" onclick="closeSheet('ovUpdate')">✕</span></div>

    <div class="mode-tabs">
      <button class="mode-tab on" id="modeAdd" onclick="setUpdateMode('add')">+ Adicionar</button>
      <button class="mode-tab" id="modeSet" onclick="setUpdateMode('set')">= Definir total</button>
    </div>

    <div id="updHint" style="text-align:center;color:var(--dim);font-size:13px;margin-bottom:8px;"></div>
    <div class="big-amount">
      <span class="prefix" id="updPrefix">R$</span>
      <input type="text" inputmode="decimal" id="updVal" placeholder="0">
    </div>
    <div id="updCurrentInfo" style="text-align:center;color:var(--dim);font-size:13px;margin-bottom:16px;"></div>

    <button class="btn-p" onclick="saveUpdate()">Salvar</button>
  </div>
</div>

<!-- ══ DETALHE DA META ══ -->
<div class="overlay" id="ovDetail">
  <div class="sheet">
    <div class="handle"></div>
    <div id="detailContent"></div>
    <button class="btn-s" onclick="closeSheet('ovDetail');openEditMeta(S.detail)">✏️ Editar meta</button>
  </div>
</div>

<!-- ══ SETTINGS ══ -->
<div class="overlay" id="ovSettings">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sh-title">Configurações<span class="x" onclick="closeSheet('ovSettings')">✕</span></div>
    <div class="set-row" onclick="toggleTheme()">
      <div class="ic" id="themeIco">🌙</div>
      <div class="tl">Tema claro / escuro</div>
      <div class="ch">›</div>
    </div>
    <div style="text-align:center;margin-top:24px;color:var(--dim);font-size:11.5px;">Cofre · dados no Firebase</div>
  </div>
</div>

<!-- ══ CONFIRM ══ -->
<div class="cfm" id="cfmBox">
  <div class="panel">
    <h3>Excluir meta?</h3>
    <p>Essa ação não pode ser desfeita. Todo o progresso será perdido.</p>
    <div class="acts">
      <button class="cancel" onclick="closeCfm()">Cancelar</button>
      <button class="ok" onclick="confirmDel()">Excluir</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   COFRE · METAS
   Firebase: financas-pessoais-ec8c5
═══════════════════════════════════════════ */
const FB = {
  apiKey:"AIzaSyA5Vl2Hnv_uYEj_KkhFsI6GVwQBRRxvY30",
  authDomain:"financas-pessoais-ec8c5.firebaseapp.com",
  projectId:"financas-pessoais-ec8c5",
  storageBucket:"financas-pessoais-ec8c5.firebasestorage.app",
  messagingSenderId:"301380558959",
  appId:"1:301380558959:web:38b22134d1c5d47253ed9a"
};
firebase.initializeApp(FB);
const auth = firebase.auth();
const db   = firebase.firestore();
db.enablePersistence().catch(()=>{});
let uid = null;

const EMOJIS = ['🎯','👶','🏠','💪','📚','✈️','🚗','💻','🎸','🏋️','📖','🧘','🎓','💊','🏡','🌱','💡','🎁','❤️','⚽','🧒','👼','🛏️','🔧','📈','🌟','🏆','💍','🐣','🎂'];
const COLORS = ['#d4a843','#6aad58','#5b91c9','#c97e42','#9b78d8','#d4655a','#4fb0c6','#d47843','#6fada8','#c95a8a'];

const S = {
  metas: [],
  editing: null,   // id being edited
  detail: null,    // id open in detail
  updMode: 'add',  // 'add' | 'set'
  metaTipo: 'dinheiro',
  selEmoji: '🎯',
  selColor: '#d4a843',
};

/* ─── HELPERS ─────────────────────────── */
const uCol = () => db.collection('users').doc(uid).collection('metas');
function brl(v){ return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function num(v){ return Number(v||0).toLocaleString('pt-BR'); }
function parseMoney(s){ return parseFloat(String(s).replace(/[^\d,.-]/g,'').replace(/\.(?=\d{3})/g,'').replace(',','.'))||0; }
function fmtInput(inp){
  let v=inp.value.replace(/\D/g,'');
  if(!v){inp.value='';return;}
  v=(parseInt(v,10)/100).toFixed(2);
  let[i,d]=v.split('.');
  i=i.replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  inp.value=i+','+d;
}
function todayISO(){ return new Date().toISOString().slice(0,10); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m; t.classList.add('show');
  clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'),2100);
}
function splashErr(m){
  const e=document.getElementById('splashErr');
  e.style.display='block'; e.textContent=m;
  document.querySelector('#splash .spin').style.display='none';
}

/* ─── SHEETS ──────────────────────────── */
function openSheet(id){ document.getElementById(id).classList.add('show'); }
function closeSheet(id){ document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('show'); });
});

/* ─── AUTH ────────────────────────────── */
auth.onAuthStateChanged(u=>{
  if(u){ uid=u.uid; listenMetas(); }
  else auth.signInAnonymously().catch(e=>splashErr('Erro ao conectar: '+(e.code||e.message)));
});
setTimeout(()=>{
  if(document.getElementById('app').style.display!=='block')
    splashErr('Timeout — confira Authentication (Anonymous) e regras do Firestore.');
},9000);

function listenMetas(){
  uCol().onSnapshot(
    snap=>{
      S.metas=snap.docs.map(d=>({id:d.id,...d.data()}));
      launch();
      renderAll();
    },
    err=>splashErr('Erro Firestore: '+(err.code||err.message))
  );
}
let launched=false;
function launch(){
  if(launched) return; launched=true;
  document.getElementById('splash').style.display='none';
  document.getElementById('app').style.display='block';
}

/* ─── RENDER ──────────────────────────── */
function renderAll(){ renderSummary(); renderGoals(); }

function renderSummary(){
  const total = S.metas.length;
  if(!total){ document.getElementById('summary').innerHTML=''; return; }
  const concluidas = S.metas.filter(m=>Number(m.atual||0)>=Number(m.alvo||0)).length;
  const atrasadas  = S.metas.filter(m=>{
    if(Number(m.atual||0)>=Number(m.alvo||0)) return false;
    return m.prazo && daysBetween(todayISO(), m.prazo)<0;
  }).length;

  let chips = `<div class="sum-chip"><strong>${total}</strong> meta${total!==1?'s':''}</div>`;
  if(concluidas) chips+=`<div class="sum-chip done">✅ <strong>${concluidas}</strong> concluída${concluidas!==1?'s':''}</div>`;
  if(atrasadas)  chips+=`<div class="sum-chip alert">⚠️ <strong>${atrasadas}</strong> atrasada${atrasadas!==1?'s':''}</div>`;
  document.getElementById('summary').innerHTML=chips;
}

function deadlineBadge(m){
  const pct = Number(m.alvo||0)>0 ? Number(m.atual||0)/Number(m.alvo||0) : 0;
  if(pct>=1) return {label:'Concluída 🎉', cls:'done'};
  if(!m.prazo) return null;
  const days = daysBetween(todayISO(), m.prazo);
  if(days<0)  return {label:`${Math.abs(days)}d em atraso`, cls:'late'};
  if(days===0) return {label:'Vence hoje!', cls:'warn'};
  if(days<=14) return {label:`${days} dias`, cls:'warn'};
  return {label:`${days} dias`, cls:'ok'};
}

function renderGoals(){
  const el = document.getElementById('goalsList');
  if(!S.metas.length){
    el.innerHTML=`<div class="empty">
      <span class="big">🎯</span>
      <div class="etitle">Nenhuma meta ainda</div>
      <p>Crie sua primeira meta e comece a acompanhar seu progresso.</p>
      <button class="start-btn" onclick="openNewMeta()">Criar primeira meta</button>
    </div>`;
    return;
  }

  // Sort: não concluídas primeiro, depois por prazo
  const sorted=[...S.metas].sort((a,b)=>{
    const aDone=Number(a.atual||0)>=Number(a.alvo||0);
    const bDone=Number(b.atual||0)>=Number(b.alvo||0);
    if(aDone!==bDone) return aDone?1:-1;
    if(a.prazo&&b.prazo) return a.prazo.localeCompare(b.prazo);
    return (a.createdAt||0)-(b.createdAt||0);
  });

  el.innerHTML=sorted.map(m=>{
    const alvo   = Number(m.alvo||0);
    const atual  = Number(m.atual||0);
    const pct    = alvo>0 ? Math.min(100,(atual/alvo)*100) : 0;
    const isDone = pct>=100;
    const isMoney= m.tipo!=='contador';
    const badge  = deadlineBadge(m);
    const cor    = m.cor||'#d4a843';
    const restante = alvo-atual;

    return `<div class="goal-card" onclick="openDetail('${m.id}')">
      <div class="accent-bar" style="background:${cor}"></div>
      <div class="top-row">
        <div class="emoji-wrap" style="background:${cor}22">${m.emoji||'🎯'}</div>
        <div class="meta-info">
          <div class="meta-name">${esc(m.nome)}</div>
          <div class="meta-desc">${m.desc?esc(m.desc):(isMoney?'Meta financeira':'Meta de contagem')}</div>
        </div>
        ${badge?`<div class="deadline-badge ${badge.cls}">${badge.label}</div>`:''}
      </div>

      <div class="progress-section">
        <div class="progress-nums">
          <div class="cur" style="color:${cor}">${isMoney?brl(atual):num(atual)+' '+(m.unidade||'')}</div>
          <div class="pct">${Math.round(pct)}%</div>
        </div>
        <div class="progress-nums" style="margin-top:-6px;margin-bottom:8px;">
          <div class="tgt">de ${isMoney?brl(alvo):num(alvo)+' '+(m.unidade||'')}</div>
          ${!isDone&&restante>0?`<div class="tgt">faltam ${isMoney?brl(restante):num(restante)+' '+(m.unidade||'')}</div>`:''}
        </div>
        <div class="track">
          <div class="fill" style="width:${pct}%;background:${cor}"></div>
        </div>
      </div>

      ${isDone
        ? `<div class="completed-banner">🎉 Meta concluída! Parabéns!</div>`
        : `<div class="card-actions">
            <button class="act-btn add" style="background:${cor}18;color:${cor}" onclick="event.stopPropagation();openUpdate('${m.id}','add')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
              Adicionar
            </button>
            <button class="act-btn set" onclick="event.stopPropagation();openUpdate('${m.id}','set')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/></svg>
              Definir total
            </button>
          </div>`
      }
    </div>`;
  }).join('');
}

/* ─── DETAIL ──────────────────────────── */
function openDetail(id){
  S.detail=id;
  const m=S.metas.find(x=>x.id===id);
  if(!m) return;
  const alvo=Number(m.alvo||0), atual=Number(m.atual||0);
  const pct=alvo>0?Math.min(100,(atual/alvo)*100):0;
  const isMoney=m.tipo!=='contador';
  const cor=m.cor||'#d4a843';
  const badge=deadlineBadge(m);
  const days=m.prazo?daysBetween(todayISO(),m.prazo):null;

  document.getElementById('detailContent').innerHTML=`
    <div class="detail-hero">
      <span class="big-emoji">${m.emoji||'🎯'}</span>
      <div class="d-name">${esc(m.nome)}</div>
      ${m.desc?`<div class="d-desc">${esc(m.desc)}</div>`:''}
    </div>
    <div class="detail-stats">
      <div class="d-stat">
        <div class="dv" style="color:${cor}">${isMoney?brl(atual):num(atual)}</div>
        <div class="dl">Atual</div>
      </div>
      <div class="d-stat">
        <div class="dv">${isMoney?brl(alvo):num(alvo)}</div>
        <div class="dl">Meta</div>
      </div>
      <div class="d-stat">
        <div class="dv">${days!==null?(days>=0?days+'d':'−'+Math.abs(days)+'d'):'—'}</div>
        <div class="dl">${days!==null?(days>=0?'Restantes':'Em atraso'):'Sem prazo'}</div>
      </div>
    </div>
    <div class="detail-progress">
      <div class="dp-row">
        <span>Progresso</span>
        <strong>${Math.round(pct)}%</strong>
      </div>
      <div class="track" style="height:10px">
        <div class="fill" style="width:${pct}%;background:${cor}"></div>
      </div>
      ${badge&&badge.cls!=='done'?`<div style="text-align:center;margin-top:10px;"><span class="deadline-badge ${badge.cls}">${badge.label}</span></div>`:''}
      ${pct>=100?`<div class="completed-banner" style="margin-top:12px;">🎉 Meta concluída!</div>`:''}
    </div>
    ${pct<100?`<div style="display:flex;gap:8px;margin-bottom:4px;">
      <button class="act-btn add" style="flex:1;padding:13px;background:${cor}18;color:${cor}" onclick="closeSheet('ovDetail');openUpdate('${m.id}','add')">+ Adicionar</button>
      <button class="act-btn set" style="flex:1;padding:13px;" onclick="closeSheet('ovDetail');openUpdate('${m.id}','set')">=  Definir total</button>
    </div>`:''}
  `;
  openSheet('ovDetail');
}

/* ─── UPDATE PROGRESS ─────────────────── */
function openUpdate(id, mode){
  S.editing=id;
  setUpdateMode(mode);
  const m=S.metas.find(x=>x.id===id);
  document.getElementById('updTitle').textContent='📊 '+m.nome;
  document.getElementById('updVal').value='';
  updateHint(m);
  openSheet('ovUpdate');
  setTimeout(()=>document.getElementById('updVal').focus(),300);
}

function setUpdateMode(mode){
  S.updMode=mode;
  document.getElementById('modeAdd').classList.toggle('on',mode==='add');
  document.getElementById('modeSet').classList.toggle('on',mode==='set');
  const m=S.metas.find(x=>x.id===S.editing);
  if(m) updateHint(m);
}

function updateHint(m){
  const isMoney=m.tipo!=='contador';
  const atual=Number(m.atual||0);
  const unit=m.unidade||'unidades';
  const hint=document.getElementById('updHint');
  const info=document.getElementById('updCurrentInfo');
  const prefix=document.getElementById('updPrefix');
  if(S.updMode==='add'){
    hint.textContent='Quanto quer adicionar?';
    info.textContent=`Atual: ${isMoney?brl(atual):num(atual)+' '+unit}`;
    prefix.textContent=isMoney?'R$':'+';
  } else {
    hint.textContent='Informe o valor total acumulado';
    info.textContent=`Atual: ${isMoney?brl(atual):num(atual)+' '+unit}`;
    prefix.textContent=isMoney?'R$':'=';
  }
}

document.addEventListener('input',e=>{
  if(e.target.id==='updVal'||e.target.id==='mAlvo'||e.target.id==='mAtual'){
    const m=S.metas.find(x=>x.id===S.editing);
    const isMoney=!m||m.tipo!=='contador';
    if((e.target.id==='updVal'&&isMoney)||e.target.id==='mAlvo'||e.target.id==='mAtual'){
      fmtInput(e.target);
    }
  }
});

async function saveUpdate(){
  const val=parseMoney(document.getElementById('updVal').value);
  if(!val&&val!==0){ toast('Informe um valor'); return; }
  const m=S.metas.find(x=>x.id===S.editing);
  if(!m) return;
  const novoAtual=S.updMode==='add'?Number(m.atual||0)+val:val;
  try{
    await uCol().doc(S.editing).update({atual:novoAtual});
    closeSheet('ovUpdate');
    toast(novoAtual>=Number(m.alvo||0)?'Meta concluída! 🎉':'Progresso atualizado ✓');
  }catch(e){ toast('Erro: '+e.message); }
}

/* ─── NEW / EDIT META ─────────────────── */
const EMOJI_EMOJIS = EMOJIS;

function buildEmojiGrid(){
  document.getElementById('emojiGrid').innerHTML=EMOJI_EMOJIS.map(e=>
    `<button class="e-btn ${e===S.selEmoji?'on':''}" onclick="pickEmoji(this,'${e}')">${e}</button>`
  ).join('');
}
function pickEmoji(el,e){
  S.selEmoji=e;
  document.querySelectorAll('.e-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
}
function buildColorRow(){
  document.getElementById('colorRow').innerHTML=COLORS.map(c=>
    `<div class="c-dot ${c===S.selColor?'on':''}" style="background:${c}" onclick="pickColor(this,'${c}')"></div>`
  ).join('');
}
function pickColor(el,c){
  S.selColor=c;
  document.querySelectorAll('.c-dot').forEach(d=>d.classList.remove('on'));
  el.classList.add('on');
}

function setMetaTipo(t){
  S.metaTipo=t;
  document.getElementById('segDinheiro').classList.toggle('on',t==='dinheiro');
  document.getElementById('segContador').classList.toggle('on',t==='contador');
  document.getElementById('fUnidade').style.display=t==='contador'?'block':'none';
  document.getElementById('mAlvoLabel').textContent=t==='dinheiro'?'Meta total (R$)':'Meta total (número)';
  document.getElementById('mAtualLabel').textContent=t==='dinheiro'?'Já tenho (R$)':'Já fiz (número)';
  if(t==='contador'){
    document.getElementById('mAlvo').removeAttribute('inputmode');
    document.getElementById('mAtual').removeAttribute('inputmode');
  } else {
    document.getElementById('mAlvo').setAttribute('inputmode','decimal');
    document.getElementById('mAtual').setAttribute('inputmode','decimal');
  }
}

function openNewMeta(){
  S.editing=null;
  S.selEmoji='🎯'; S.selColor='#d4a843';
  document.getElementById('metaModalTitle').textContent='Nova meta';
  document.getElementById('metaDelBtn').style.display='none';
  document.getElementById('mNome').value='';
  document.getElementById('mAlvo').value='';
  document.getElementById('mAtual').value='0';
  document.getElementById('mPrazo').value='';
  document.getElementById('mUnidade').value='';
  document.getElementById('mDesc').value='';
  setMetaTipo('dinheiro');
  buildEmojiGrid(); buildColorRow();
  openSheet('ovMeta');
  setTimeout(()=>document.getElementById('mNome').focus(),300);
}
function openEditMeta(id){
  const m=S.metas.find(x=>x.id===id);
  if(!m) return;
  S.editing=id;
  S.selEmoji=m.emoji||'🎯';
  S.selColor=m.cor||'#d4a843';
  document.getElementById('metaModalTitle').textContent='Editar meta';
  document.getElementById('metaDelBtn').style.display='block';
  document.getElementById('mNome').value=m.nome||'';
  document.getElementById('mPrazo').value=m.prazo||'';
  document.getElementById('mUnidade').value=m.unidade||'';
  document.getElementById('mDesc').value=m.desc||'';
  setMetaTipo(m.tipo||'dinheiro');
  const isMoney=m.tipo!=='contador';
  const alvo=Number(m.alvo||0), atual=Number(m.atual||0);
  if(isMoney){
    document.getElementById('mAlvo').value=alvo.toFixed(2).replace('.',',');
    document.getElementById('mAtual').value=atual.toFixed(2).replace('.',',');
  } else {
    document.getElementById('mAlvo').value=String(alvo);
    document.getElementById('mAtual').value=String(atual);
  }
  buildEmojiGrid(); buildColorRow();
  openSheet('ovMeta');
}

async function saveMeta(){
  const nome=document.getElementById('mNome').value.trim();
  if(!nome){ toast('Dê um nome pra meta'); return; }
  const isMoney=S.metaTipo!=='contador';
  const alvo=isMoney?parseMoney(document.getElementById('mAlvo').value):Number(document.getElementById('mAlvo').value)||0;
  const atual=isMoney?parseMoney(document.getElementById('mAtual').value):Number(document.getElementById('mAtual').value)||0;
  if(!alvo){ toast('Informe o valor da meta'); return; }

  const payload={
    nome, tipo:S.metaTipo,
    unidade:document.getElementById('mUnidade').value.trim()||null,
    alvo, atual,
    prazo:document.getElementById('mPrazo').value||null,
    emoji:S.selEmoji, cor:S.selColor,
    desc:document.getElementById('mDesc').value.trim()||null,
    updatedAt:Date.now()
  };
  try{
    if(S.editing) await uCol().doc(S.editing).update(payload);
    else { payload.createdAt=Date.now(); await uCol().add(payload); }
    closeSheet('ovMeta');
    toast(S.editing?'Meta atualizada ✓':'Meta criada 🎯');
  }catch(e){ toast('Erro: '+e.message); }
}

/* ─── DELETE ──────────────────────────── */
function askDel(){ document.getElementById('cfmBox').classList.add('show'); }
function closeCfm(){ document.getElementById('cfmBox').classList.remove('show'); }
async function confirmDel(){
  if(!S.editing){ closeCfm(); return; }
  try{
    await uCol().doc(S.editing).delete();
    closeSheet('ovMeta');
    toast('Meta excluída');
  }catch(e){ toast('Erro: '+e.message); }
  closeCfm();
}

/* ─── SETTINGS ────────────────────────── */
function openSettings(){ openSheet('ovSettings'); }
function toggleTheme(){
  const h=document.documentElement;
  const dark=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',dark?'light':'dark');
  document.getElementById('themeIco').textContent=dark?'☀️':'🌙';
}
</script>
</body>
</html>
